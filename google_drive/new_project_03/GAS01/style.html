<style>
  /* -------------------------------------------------------------
     Modern Glassmorphism Dark Theme Design System
  ------------------------------------------------------------- */
  
  :root {
    --bg-gradient-start: #0B0F19;
    --bg-gradient-end: #1E1B4B;
    --card-bg: rgba(17, 24, 39, 0.75);
    --card-border: rgba(255, 255, 255, 0.08);
    --text-primary: #F3F4F6;
    --text-secondary: #9CA3AF;
    --text-muted: #6B7280;
    --primary-gradient: linear-gradient(135deg, #06B6D4 0%, #6366F1 100%);
    --primary-glow: rgba(6, 182, 212, 0.4);
    --success-color: #10B981;
    --error-color: #EF4444;
    --accent-color: #38BDF8;
    --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* Reset & Box Sizing */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Scrollbar Customization */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(11, 15, 25, 0.5);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  /* App Container Layout */
  .app-container {
    width: 100%;
    max-width: 850px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Header Styling */
  .app-header {
    text-align: center;
    padding: 20px 0 10px 0;
  }

  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    font-size: 2.5rem;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px var(--primary-glow));
    animation: rotateLogo 8s linear infinite;
  }

  .app-header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--text-secondary);
    font-weight: 300;
  }

  /* Cards Design (Glassmorphism) */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }

  .card:hover {
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
  }

  /* Input Section */
  .input-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .input-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .label-icon, .title-icon {
    color: var(--accent-color);
  }

  .input-wrapper {
    position: relative;
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .input-wrapper:focus-within {
    border-color: #06B6D4;
    box-shadow: 0 0 12px rgba(6, 182, 212, 0.2);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    padding: 16px;
    font-family: var(--font-sans);
    font-size: 1rem;
    line-height: 1.6;
    resize: none;
  }

  textarea::placeholder {
    color: var(--text-muted);
  }

  /* Button Design */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--primary-gradient);
    border: none;
    outline: none;
    border-radius: 12px;
    color: white;
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 600;
    padding: 14px 28px;
    cursor: pointer;
    align-self: flex-end;
    box-shadow: 0 4px 15px var(--primary-glow);
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(6, 182, 212, 0.6);
  }

  .btn-primary:active {
    transform: translateY(1px);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-icon {
    font-size: 1.2rem;
  }

  /* Output Section */
  .output-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .output-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.2rem;
    font-weight: 600;
  }

  /* Answer Display Box */
  .ai-answer-box {
    min-height: 200px;
    max-height: 500px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 20px;
    line-height: 1.7;
    font-size: 1rem;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: all 0.3s ease;
  }

  /* Empty State placeholder design */
  .ai-answer-box.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 10px;
    text-align: center;
  }

  .default-state-icon {
    font-size: 2.2rem;
    color: rgba(255, 255, 255, 0.1);
  }

  .placeholder-text {
    font-size: 0.95rem;
    font-weight: 300;
  }

  /* Chat Turn Layout */
  .chat-turn {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .chat-turn:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .chat-question, .chat-answer {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .chat-icon {
    font-size: 1.6rem;
    color: var(--accent-color);
    margin-top: 4px;
    flex-shrink: 0;
  }

  .spin-icon {
    animation: spin 8s linear infinite;
  }

  .chat-bubble-user {
    background: rgba(6, 182, 212, 0.1);
    border: 1px solid rgba(6, 182, 212, 0.2);
    border-radius: 12px 12px 0 12px;
    padding: 12px 16px;
    color: var(--text-primary);
    max-width: 85%;
    word-break: break-word;
  }

  .chat-bubble-ai {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px 12px 12px 0;
    padding: 16px;
    color: var(--text-primary);
    flex-grow: 1;
    max-width: 85%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    word-break: break-word;
  }

  .error-bubble {
    background: rgba(239, 68, 68, 0.05);
    border-color: rgba(239, 68, 68, 0.2);
    color: #F87171;
  }

  .chat-answer.loading-active .chat-bubble-ai {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    color: var(--text-secondary);
  }

  .spinner-small {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(56, 189, 248, 0.2);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    animation: spin 1s infinite linear;
    flex-shrink: 0;
  }

  /* Metadata Panel */
  .ai-metadata {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .metadata-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .meta-icon {
    font-size: 1rem;
    color: var(--text-muted);
  }

  .ai-reply {
    white-space: pre-wrap;
  }

  /* Outline Display Box */
  .outline-box {
    min-height: 120px;
    max-height: 400px;
    overflow-y: auto;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 20px;
    line-height: 1.7;
    font-size: 0.95rem;
    white-space: pre-wrap;
    transition: all 0.3s ease;
  }

  .outline-box.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 10px;
    text-align: center;
  }

  .outline-box.result-state {
    color: var(--text-primary);
    border-left: 4px solid var(--success-color);
  }

  /* Footer Styling */
  .app-footer {
    text-align: center;
    padding: 10px 0 20px 0;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 300;
  }

  /* Animations */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulseLoading {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @keyframes rotateLogo {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Responsive Design adjustments */
  @media(max-width: 600px) {
    body {
      padding: 12px;
    }
    .card {
      padding: 16px;
    }
    .logo-icon {
      font-size: 2rem;
    }
    .app-header h1 {
      font-size: 1.6rem;
    }
    .btn-primary {
      width: 100%;
      align-self: center;
    }
  }
</style>
